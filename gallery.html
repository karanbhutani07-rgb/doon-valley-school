<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Doon Valley Secondary School</title>
  <meta name="description" content="Photo gallery of Doon Valley Secondary School events and campus.">
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
  <header>
    <div class="nav-container">
      <a href="./index.html" class="logo">
        <img src="./assets/images/logo.png" alt="Doon Valley School Logo" class="nav-logo">
      </a>

      <button class="mobile-menu-btn" aria-label="Open menu">☰</button>

      <nav class="nav-links">
        <a href="./index.html">Home</a>
        <a href="./about.html">About Us</a>
        <a href="./gallery.html" class="active">Gallery</a>
        <a href="./contact.html">Contact Us</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h1>Gallery</h1>
    </div>

    <section class="gallery-grid">
      <div class="gallery-item"><img src="./assets/images/g01.jpg" alt="School activity 1"></div>
      <div class="gallery-item"><img src="./assets/images/g02.jpg" alt="School activity 2"></div>
      <div class="gallery-item"><img src="./assets/images/g03.jpg" alt="School activity 3"></div>
      <div class="gallery-item"><img src="./assets/images/g04.jpg" alt="School activity 4"></div>
      <div class="gallery-item"><img src="./assets/images/g05.jpg" alt="School activity 5"></div>
      <div class="gallery-item"><img src="./assets/images/g06.jpg" alt="School activity 6"></div>
      <div class="gallery-item"><img src="./assets/images/g07.jpg" alt="School activity 7"></div>
      <div class="gallery-item"><img src="./assets/images/g08.jpg" alt="School activity 8"></div>
      <div class="gallery-item"><img src="./assets/images/g09.jpg" alt="School activity 9"></div>
      <div class="gallery-item"><img src="./assets/images/g10.jpg" alt="School activity 10"></div>
      <div class="gallery-item"><img src="./assets/images/g11.jpg" alt="School activity 11"></div>
      <div class="gallery-item"><img src="./assets/images/g12.jpg" alt="School activity 12"></div>
    </section>

    <div class="lightbox">
      <button class="lightbox-close" aria-label="Close">×</button>
      <button class="lightbox-nav lightbox-prev" aria-label="Previous">❮</button>
      <div class="lightbox-content">
        <img src="" alt="Enlarged gallery image">
      </div>
      <button class="lightbox-nav lightbox-next" aria-label="Next">❯</button>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <a href="./index.html" class="logo">
        <img src="./assets/images/logo.png" alt="Doon Valley School Logo" class="footer-logo">
      </a>

      <div class="footer-bottom">
        <p>&copy; <span id="year"></span> Doon Valley Secondary School</p>
        <p>Built by Cryotonics Ltd.</p>
      </div>
    </div>
  </footer>

  <script src="./assets/js/script.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
